{% extends "base.html" %}
{% block title %}Assign Homework — Nurture{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">📝 Assign Homework</h1>
    <a href="{% url 'homework_manage' %}" class="btn btn-outline btn-sm">← Back</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Batch *</label>
            <select name="batch" class="form-input" required>
                <option value="">— Select Batch —</option>
                {% for batch in batches %}
                <option value="{{ batch.pk }}">{{ batch.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Subject *</label>
            <select name="subject" class="form-input" required>
                <option value="">— Select Subject —</option>
                {% for subj in subjects %}
                <option value="{{ subj.pk }}">{{ subj }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Description *</label>
            <textarea name="description" class="form-input" rows="3" placeholder="Complete Chapter 5 exercises Q1-Q10..." required></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Due Date *</label>
            <input type="date" name="due_date" class="form-input" value="{{ today|date:'Y-m-d' }}" required>
        </div>
        <button type="submit" class="btn btn-primary">📝 Assign Homework</button>
    </form>
</div>
{% endblock %}

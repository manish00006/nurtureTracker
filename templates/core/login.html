<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Nurture Coaching Class</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🌱</div>
                <h1 class="login-title">Nurture Coaching</h1>
                <p class="login-subtitle">Track your child's progress</p>
            </div>

            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li class="message {{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="id_username">Username</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label class="form-label" for="id_password">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top: 0.5rem;">
                    Sign In →
                </button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: var(--text-muted);">
                Nurture Coaching Class — Ghansoli, Navi Mumbai
            </p>
        </div>
    </div>
</body>
</html>
